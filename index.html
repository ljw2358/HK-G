<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HK Smart Vision</title>
    <style>
        /* 짙은 보라색 배경과 빛나는 글씨 스타일 */
        body { 
            background-color: #2e003e; 
            color: #fffae6; /* 양광 느낌의 밝은 크림색 */
            font-family: 'Segoe UI', Arial, sans-serif; 
            padding: 40px; 
            line-height: 1.8;
        }
        h1 { color: #f0e6ff; text-shadow: 0 0 10px #d4aaff; }
        h2 { color: #d4aaff; font-weight: 300; }
        
        #langSelector {
            background-color: #4b0082;
            color: white;
            border: 1px solid #d4aaff;
            padding: 5px;
            margin-bottom: 20px;
        }

        .menu-item { margin-bottom: 20px; border-left: 3px solid #d4aaff; padding-left: 15px; }
        .menu-name { font-weight: bold; color: #ffeb3b; text-shadow: 0 0 5px #ffeb3b; }
    </style>
</head>
<body>

    <h1 id="title">HK Smart Vision</h1>
    <h2 id="subtitle">일상을 연결하는 지능형 웨어러블 솔루션</h2>

    <select id="langSelector" onchange="changeLanguage()">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh">简体中文</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="ru">Русский</option>
        <option value="pt">Português</option>
        <option value="ar">العربية</option>
        <option value="hi">हिन्दी</option>
        <option value="it">Italiano</option>
        <option value="vi">Tiếng Việt</option>
    </select>

    <div id="features" style="margin-top: 20px;"></div>

    <script>
        const contentData = {
            ko: {
                title: "HK Smart Vision", subtitle: "일상을 연결하는 지능형 웨어러블 솔루션",
                features: [
                    {n: "Neural Auth", d: "뇌파 또는 생체 신호를 활용한 가장 안전한 본인 인증 시스템입니다."},
                    {n: "Sync", d: "모든 기기와 끊김 없는 데이터 연결 및 환경 설정을 유지합니다."},
                    {n: "Payment", d: "시선과 제스처만으로 이루어지는 차세대 결제 경험을 제공합니다."},
                    {n: "Sentiment Analysis", d: "대화 상대의 감정을 실시간으로 파악하여 최적의 소통을 돕습니다."},
                    {n: "Translation", d: "언어 장벽 없이 전 세계 누구와도 자유롭게 대화하세요."},
                    {n: "Management", d: "글래스의 모든 상태와 연결 기기를 한눈에 관리합니다."},
                    {n: "Monitoring", d: "기기 가동 상태와 보안 시스템을 실시간으로 확인합니다."},
                    {n: "Energy Mgmt", d: "스마트한 배터리 최적화로 더 오랜 시간 사용 가능합니다."},
                    {n: "Data", d: "사용 패턴을 학습하여 더욱 개인화된 인사이트를 제공합니다."}
                ]
            },
            en: {
                title: "HK Smart Vision", subtitle: "Intelligent wearable solution connecting daily life",
                features: [
                    {n: "Neural Auth", d: "Safest authentication using brainwaves or biometrics."},
                    {n: "Sync", d: "Seamless data connectivity across all devices."},
                    {n: "Payment", d: "Next-gen payment using gaze and gestures."},
                    {n: "Sentiment Analysis", d: "Real-time communication emotion analysis."},
                    {n: "Translation", d: "Communicate worldwide without language barriers."},
                    {n: "Management", d: "Manage device status at a glance."},
                    {n: "Monitoring", d: "Real-time device and security monitoring."},
                    {n: "Energy Mgmt", d: "Smart battery optimization for efficiency."},
                    {n: "Data", d: "Personalized insights via usage pattern learning."}
                ]
            }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSelector').value;
            const content = contentData[lang] || contentData['en'];
            document.getElementById('title').innerText = content.title;
            document.getElementById('subtitle').innerText = content.subtitle;
            
            let html = "";
            content.features.forEach(f => {
                html += `<div class="menu-item"><span class="menu-name">${f.n}</span>: ${f.d}</div>`;
            });
            document.getElementById('features').innerHTML = html;
        }
        
        changeLanguage();
    </script>
</body>
</html>
